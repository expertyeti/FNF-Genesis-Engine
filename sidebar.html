<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Explorer - Custom con Miniaturas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Paleta personalizada con gris oscuro */
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --hover-bg: #2d2d2d;
            --hover-text: #ffffff;
            --border-color: #333333;
            --scrollbar-bg: #121212;
            --scrollbar-thumb: #444444;
            --scrollbar-thumb-hover: #666666;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        .sidebar {
            width: 320px;
            height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        .sidebar-header {
            padding: 15px;
            font-size: 0.9em;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            overflow: hidden;
            flex: 1;
            margin-right: 10px;
        }

        #root-folder-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .action-icon {
            cursor: pointer;
            margin-left: 10px;
            color: #888;
            transition: color 0.2s;
            display: none;
        }

        .action-icon:hover {
            color: var(--text-color);
        }

        .upload-btn {
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 1.2em;
            transition: color 0.2s;
        }

        .upload-btn:hover {
            color: var(--text-color);
        }

        #folderInput {
            display: none;
        }

        .file-explorer {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 0;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        ul ul {
            padding-left: 15px;
            border-left: 1px solid transparent;
            display: none;
        }

        ul ul.open {
            display: block;
        }

        ul ul:hover {
            border-left: 1px solid var(--border-color);
        }

        li {
            margin: 0;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 6px 15px;
            cursor: pointer;
            user-select: none;
            font-size: 0.9em;
            width: 100%;
            box-sizing: border-box;
        }

        .item:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
        }

        .item i {
            margin-right: 8px;
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        /* Estilos para las miniaturas de imágenes */
        .file-thumbnail {
            width: 16px;
            height: 16px;
            object-fit: cover;
            border-radius: 2px;
            margin-right: 8px;
            flex-shrink: 0;
            background-color: #333; /* Fondo por si la imagen tiene transparencias */
        }

        .item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .caret {
            margin-right: 5px !important;
            font-size: 0.8em;
            visibility: hidden;
            flex-shrink: 0;
        }

        .is-folder .caret {
            visibility: visible;
        }
        
        .empty-state {
            padding: 20px;
            text-align: center;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="header-title-container">
                <span id="root-folder-name">EXPLORADOR</span>
                <i class="fas fa-compress-arrows-alt action-icon" id="collapse-all-btn" title="Colapsar todas las carpetas"></i>
            </div>
            <label for="folderInput" class="upload-btn" title="Abrir carpeta">
                <i class="fas fa-folder-plus"></i>
            </label>
            <input type="file" id="folderInput" webkitdirectory directory multiple>
        </div>
        <div class="file-explorer" id="explorer-container">
            <div class="empty-state">Sube una carpeta para comenzar.</div>
        </div>
    </div>

    <script>
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const iconMap = {
                'ogg': 'fas fa-file-audio', 'mp3': 'fas fa-file-audio', 'wav': 'fas fa-file-audio',
                'mp4': 'fas fa-file-video', 'webm': 'fas fa-file-video', 'avi': 'fas fa-file-video',
                'js': 'fab fa-js', 'json': 'fas fa-cog', 'html': 'fab fa-html5', 'css': 'fab fa-css3-alt',
                'md': 'fab fa-markdown', 'txt': 'fas fa-file-alt', 'cpp': 'fas fa-file-code', 'h': 'fas fa-file-code'
            };
            return iconMap[ext] || 'fas fa-file';
        }

        // Construir el árbol de datos guardando el objeto File original
        function buildTree(fileList) {
            const root = {};
            for (let file of fileList) {
                const parts = file.webkitRelativePath.split('/');
                const relevantParts = parts.slice(1); 
                let currentLevel = root;
                
                for (let i = 0; i < relevantParts.length; i++) {
                    const part = relevantParts[i];
                    const isFile = (i === relevantParts.length - 1);
                    
                    if (!currentLevel[part]) {
                        // Guardamos la referencia al archivo si es el nivel final
                        currentLevel[part] = isFile ? { _isFile: true, name: part, fileObj: file } : {};
                    }
                    currentLevel = currentLevel[part];
                }
            }
            return root;
        }

        // Renderizar el DOM recursivamente
        function renderTree(node, container) {
            const ul = document.createElement('ul');

            const keys = Object.keys(node).sort((a, b) => {
                const isFolderA = !node[a]._isFile;
                const isFolderB = !node[b]._isFile;
                if (isFolderA && !isFolderB) return -1;
                if (!isFolderA && isFolderB) return 1;
                return a.localeCompare(b);
            });

            keys.forEach(key => {
                if (key === '_isFile' || key === 'name' || key === 'fileObj') return;

                const li = document.createElement('li');
                const isFile = node[key]._isFile;

                if (isFile) {
                    const fileObj = node[key].fileObj;
                    const ext = key.split('.').pop().toLowerCase();
                    const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'];
                    let iconHtml = '';

                    if (imageExts.includes(ext)) {
                        // Creamos una URL temporal para la imagen
                        const objectUrl = URL.createObjectURL(fileObj);
                        // Si falla al cargar (corrupta), usa el onerror para reemplazarla por el icono de fontawesome
                        iconHtml = `<img src="${objectUrl}" class="file-thumbnail" onerror="this.onerror=null; this.outerHTML='<i class=\\'fas fa-image\\'></i>'">`;
                    } else {
                        const iconClass = getFileIcon(key);
                        iconHtml = `<i class="${iconClass}"></i>`;
                    }

                    li.innerHTML = `
                        <div class="item" title="${key}">
                            <i class="fas fa-chevron-right caret"></i>
                            ${iconHtml}
                            <span>${key}</span>
                        </div>
                    `;
                } else {
                    li.innerHTML = `
                        <div class="item is-folder" onclick="toggleFolder(this)" title="${key}">
                            <i class="fas fa-chevron-right caret"></i>
                            <i class="fas fa-folder folder-icon"></i>
                            <span>${key}</span>
                        </div>
                    `;
                    renderTree(node[key], li);
                }
                ul.appendChild(li);
            });

            container.appendChild(ul);
        }

        function toggleFolder(element) {
            const subTree = element.nextElementSibling;
            if (!subTree || subTree.tagName !== 'UL') return;

            subTree.classList.toggle('open');

            const caret = element.querySelector('.caret');
            const folderIcon = element.querySelector('.folder-icon');

            if (subTree.classList.contains('open')) {
                caret.classList.replace('fa-chevron-right', 'fa-chevron-down');
                folderIcon.classList.replace('fa-folder', 'fa-folder-open');
            } else {
                caret.classList.replace('fa-chevron-down', 'fa-chevron-right');
                folderIcon.classList.replace('fa-folder-open', 'fa-folder');
            }
        }

        function collapseAll() {
            const container = document.getElementById('explorer-container');
            const openLists = container.querySelectorAll('ul.open');
            
            openLists.forEach(ul => {
                ul.classList.remove('open');
                const folderItem = ul.previousElementSibling;
                if (folderItem && folderItem.classList.contains('is-folder')) {
                    const caret = folderItem.querySelector('.caret');
                    const folderIcon = folderItem.querySelector('.folder-icon');
                    if (caret) caret.classList.replace('fa-chevron-down', 'fa-chevron-right');
                    if (folderIcon) folderIcon.classList.replace('fa-folder-open', 'fa-folder');
                }
            });
        }

        document.getElementById('collapse-all-btn').addEventListener('click', collapseAll);

        document.getElementById('folderInput').addEventListener('change', function(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            const rootName = files[0].webkitRelativePath.split('/')[0];
            document.getElementById('root-folder-name').textContent = rootName;
            document.getElementById('root-folder-name').title = rootName; 
            
            document.getElementById('collapse-all-btn').style.display = 'block';

            const container = document.getElementById('explorer-container');
            container.innerHTML = ''; 

            const treeData = buildTree(files);
            
            renderTree(treeData, container);
            
            const rootUl = container.querySelector('ul');
            if(rootUl) {
                rootUl.style.display = 'block'; 
            }
        });
    </script>
</body>
</html>
