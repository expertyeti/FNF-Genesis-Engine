<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Engine - Camera Events Converter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: monospace;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        p.desc {
            margin-bottom: 2rem;
            color: #AAAAAA;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-size: 1.1rem;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 500px;
            background-color: #000000;
            color: #FFFFFF;
            border: 2px solid #FFFFFF;
            border-radius: 16px;
            padding: 1rem;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #AAAAAA;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        input[type="text"] {
            background-color: #000000;
            color: #FFFFFF;
            border: 2px solid #FFFFFF;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        button {
            background-color: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 24px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        button:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <h1>Genesis Engine Camera Converter</h1>
    <p class="desc">Convierte eventos crudos al nuevo formato.<br><strong>Purifica espacios corruptos</strong>, ignora basura y asigna "spectator" al char 2.</p>

    <div class="container">
        <div class="panel">
            <label for="inputJson">Formato Antiguo (Sucio / Raw)</label>
            <textarea id="inputJson" placeholder='Pega aquí tu array, no importa si viene con texto basura, comas de más o espacios corruptos...'></textarea>
        </div>

        <div class="controls">
            <div class="input-group">
                <label for="arrayName">Nombre de la Dificultad</label>
                <input type="text" id="arrayName" value="events" placeholder="Ej: nightmare, erect">
            </div>
            
            <button onclick="processEvents()">Convertir >></button>
            <button onclick="copyOutput()" style="font-size: 1rem; padding: 0.5rem 1rem; border: 2px solid #FFFFFF; background: #000000; color: #FFFFFF;">Copiar Resultado</button>
        </div>

        <div class="panel">
            <label for="outputJson">Nuevo Formato (Limpio)</label>
            <textarea id="outputJson" readonly placeholder='Aquí aparecerá el resultado estructurado...'></textarea>
        </div>
    </div>

    <script>
        // Mapeo automático de Easing
        function mapEase(easeStr) {
            if (!easeStr || easeStr === "CLASSIC" || easeStr === "INSTANT") return "Linear";
            
            // Eliminamos "Dir" si viene separado (ej: quadInOut o quad + InOut)
            const cleanEase = easeStr.replace(/InOut|In|Out/g, '').toLowerCase();
            let isInOut = easeStr.includes("InOut") || easeStr.includes("inOut");
            let isIn = easeStr.includes("In") || easeStr.includes("in");
            let isOut = easeStr.includes("Out") || easeStr.includes("out");
            
            let direction = "easeOut"; // Default
            if (isInOut) direction = "easeInOut";
            else if (isIn) direction = "easeIn";

            const easeDict = {
                "expo": "Expo", "elastic": "Elastic", "sine": "Sine", 
                "circ": "Circ", "cube": "Cubic", "quad": "Quad", "back": "Back"
            };

            for (let key in easeDict) {
                if (cleanEase.includes(key)) {
                    return `${easeDict[key]}.${direction}`;
                }
            }

            return easeStr; // Retorna tal cual si no coincide
        }

        // Determinar Target según el char ID
        function getTarget(charId) {
            const id = String(charId);
            if (id === "0") return "enemy";
            if (id === "1") return "player";
            if (id === "2") return "spectator";
            return "game";
        }

        // Extractor a prueba de balas (Purificador)
        function extractEventsForgivingly(input) {
            let allEvents = [];
            
            // 0. PURIFICACIÓN EXTREMA: Reemplazar Non-Breaking Spaces (\u00A0) y otros caracteres invisibles
            // que rompen el JSON.parse cuando se copia de ciertas webs o editores.
            let sanitizedInput = input.replace(/[\u00A0\u1680\u2000-\u200A\u2028\u2029\u202F\u205F\u3000\uFEFF]/g, ' ');

            // 1. Limpiar comas sobrantes al final de arrays u objetos
            let cleanInput = sanitizedInput.replace(/,\s*([\]}])/g, '$1');

            // 2. Intento de Parseo Normal
            try {
                let data = JSON.parse(cleanInput);
                if (Array.isArray(data)) return data;
                for (let k in data) if (Array.isArray(data[k])) return data[k];
            } catch(e) {}
            
            // 3. Intento envolviendo en llaves
            try {
                let data = JSON.parse(`{${cleanInput}}`);
                for (let k in data) if (Array.isArray(data[k])) return data[k];
            } catch(e) {}

            // 4. MODO EXTRACCIÓN FORZADA (Aislar corchetes)
            let arrayRegex = /\[[\s\S]*?\]/g;
            let matches = cleanInput.match(arrayRegex);
            
            if (matches) {
                for (let m of matches) {
                    try {
                        let parsed = Function('"use strict";return (' + m + ')')();
                        if (Array.isArray(parsed)) {
                            if (parsed.length > 0 && (parsed[0].e || parsed[0].script)) {
                                allEvents = allEvents.concat(parsed);
                            }
                        }
                    } catch (e) {}
                }
            }
            
            if (allEvents.length > 0) return allEvents;
            throw new Error("No pude encontrar eventos válidos. Revisa la estructura del texto pegado.");
        }

        function processEvents() {
            const inputStr = document.getElementById('inputJson').value.trim();
            const arrayName = document.getElementById('arrayName').value.trim() || 'events';
            const outputArea = document.getElementById('outputJson');

            if (!inputStr) return;

            try {
                const rawEvents = extractEventsForgivingly(inputStr);

                const convertedArray = rawEvents
                    .filter(ev => ev.e === "FocusCamera" || ev.e === "ZoomCamera" || ev.e === "SetCameraBop")
                    .map(ev => {
                        const v = ev.v || {};
                        
                        // Corrección de tiempo a 1 y sin decimales absurdos
                        let timeParsed = Number(ev.t);
                        if (timeParsed === 0) timeParsed = 1;
                        if (!Number.isInteger(timeParsed)) timeParsed = Number(timeParsed.toFixed(3));

                        let newEv = { time: timeParsed, script: "camera" };

                        if (ev.e === "FocusCamera") {
                            newEv.scroll = {
                                target: getTarget(v.char),
                                duration: v.duration || 0,
                                offsetX: Number(v.x) || 0,
                                offsetY: Number(v.y) || 0,
                                ease: mapEase(v.ease || v.easeDir)
                            };
                        } 
                        else if (ev.e === "ZoomCamera") {
                            let combinedEase = v.ease || "";
                            if (v.easeDir && !combinedEase.includes(v.easeDir)) {
                                combinedEase += v.easeDir;
                            }
                            
                            newEv.zoom = {
                                amount: v.zoom || 1,
                                duration: v.duration || 0,
                                ease: mapEase(combinedEase)
                            };
                        } 
                        else if (ev.e === "SetCameraBop") {
                            newEv.booping = {
                                beats: v.rate || 4,
                                intensity: v.intensity || 0
                            };
                        }

                        return newEv;
                    });

                const finalResult = { [arrayName]: convertedArray };
                outputArea.value = JSON.stringify(finalResult, null, 2);

            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        function copyOutput() {
            const outputArea = document.getElementById('outputJson');
            if (outputArea.value) {
                outputArea.select();
                document.execCommand('copy');
                alert("¡Copiado al portapapeles!");
            }
        }
    </script>
</body>
</html>
